name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/

  build-mac:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/

  release:
    needs: [build-win, build-mac]
    if: always() && needs.build-win.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "Tag: $TAG"
          echo "Artifacts:"
          find artifacts -type f | head -20

          # Collect installer files into a clean folder
          mkdir -p upload
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" \) -exec cp {} upload/ \;
          ls -la upload/

          # Upload each file individually to handle spaces
          for f in upload/*; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber --repo "$GITHUB_REPOSITORY" || true
          done
