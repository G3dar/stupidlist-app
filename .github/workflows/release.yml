name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/*-win.zip

  build-mac:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/*-mac.zip

  release:
    needs: [build-win, build-mac]
    if: always() && needs.build-win.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Collect all installer files
          FILES=$(find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" \) 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "No artifacts found"
            exit 1
          fi
          echo "Uploading: $FILES"
          # Upload to existing release (created by release script) or create new one
          gh release upload "$TAG" $FILES --clobber 2>/dev/null \
            || gh release create "$TAG" --title "stupidlist $TAG" --generate-notes $FILES
