<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com wss://*.firebaseio.com https://api.github.com; frame-src https://accounts.google.com https://*.firebaseapp.com; img-src 'self' https://*.googleusercontent.com">
  <title>stupidlist</title>
  <link rel="stylesheet" href="/renderer-web.css?v=12">
  <style>
    @font-face {
      font-family: 'system-mono';
      src: local('JetBrains Mono'), local('SF Mono'), local('Consolas'), local('monospace');
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1 class="logo">stupidlist</h1>
      </div>
      <div class="header-right">
        <div id="day-nav">
          <button id="btn-projects" class="nav-btn nav-projects" title="Projects">projects</button>
          <button id="btn-prev" class="nav-btn" title="Previous day">&lsaquo;</button>
          <span id="date-label" class="date-label"></span>
          <button id="btn-next" class="nav-btn" title="Next day">&rsaquo;</button>
          <button id="btn-today" class="nav-btn nav-today" title="Go to today">today</button>
        </div>
        <div id="list-nav" style="display:none"></div>
      </div>
      <a id="download-btn" href="https://github.com/G3dar/stupidlist-app/releases/latest" class="btn-download" title="Download desktop app" target="_blank">⤓</a>
      <div class="header-auth" id="auth-area"></div>
    </header>
    <div id="projects-dropdown" style="display:none"></div>
    <main id="list-container">
      <ul id="item-list"></ul>
    </main>
    <div id="carry-over"></div>
  </div>
  <script src="/renderer-web.js?v=12"></script>
  <script>
    (function() {
      var btn = document.getElementById('download-btn');
      if (!btn) return;
      var ua = navigator.userAgent;
      var isMac = /Mac/.test(ua);
      var isWin = /Win/.test(ua);
      if (!isMac && !isWin) return;
      btn.textContent = isMac ? 'Download for Mac' : 'Download for Windows';
      fetch('https://api.github.com/repos/G3dar/stupidlist-app/releases/latest')
        .then(function(r) { return r.json(); })
        .then(function(release) {
          if (!release.assets) return;
          var ext = isMac ? '.dmg' : '.exe';
          var asset = release.assets.find(function(a) { return a.name.endsWith(ext); });
          if (asset) btn.href = asset.browser_download_url;
        })
        .catch(function() {});
    })();
  </script>
</body>
</html>
