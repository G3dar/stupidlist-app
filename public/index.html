<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor: ionic:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com capacitor: ionic:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com wss://*.firebaseio.com https://api.github.com capacitor: ionic:; frame-src https://accounts.google.com https://appleid.apple.com https://*.firebaseapp.com; img-src 'self' https://*.googleusercontent.com data:">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="stupidlist">
  <title>stupidlist</title>
  <link rel="stylesheet" href="/renderer-web.css?v=31">
  <style>
    @font-face {
      font-family: 'system-mono';
      src: local('JetBrains Mono'), local('SF Mono'), local('Consolas'), local('monospace');
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1 class="logo">stupidlist</h1>
        <button id="btn-copy-list" class="btn-copy" title="Copy list to clipboard">⧉</button>
        <button id="btn-new-list" class="btn-new" title="New list">+</button>
      </div>
      <button id="btn-menu" class="nav-btn nav-menu" title="Menu">☰</button>
      <div class="header-right">
        <div id="day-nav">
          <button id="btn-lists" class="nav-btn nav-lists" title="Lists">lists</button>
          <button id="btn-projects" class="nav-btn nav-projects" title="Projects">projects</button>
          <button id="btn-prev" class="nav-btn" title="Previous day">&lsaquo;</button>
          <span id="date-label" class="date-label"></span>
          <button id="btn-next" class="nav-btn" title="Next day">&rsaquo;</button>
          <button id="btn-today" class="nav-btn nav-today" title="Go to today">today</button>
        </div>
        <div id="list-nav" style="display:none"></div>
      </div>
      <button id="btn-settings" class="nav-btn nav-settings" title="Settings">&#x2699;</button>
      <a id="download-btn" href="https://github.com/G3dar/stupidlist-app/releases/latest" class="btn-download" title="Download desktop app" target="_blank">⤓</a>
      <div class="header-auth" id="auth-area"></div>
    </header>
    <div id="projects-dropdown" style="display:none"></div>
    <div id="lists-dropdown" style="display:none"></div>
    <main id="list-container">
      <ul id="item-list"></ul>
    </main>
    <div id="carry-over"></div>
  </div>
  <script>
    (function() {
      var V = '30';
      if (localStorage.getItem('_appV') !== V) {
        localStorage.setItem('_appV', V);
        if ('caches' in window) {
          caches.keys().then(function(k) { k.forEach(function(n) { caches.delete(n); }); });
        }
        location.replace(location.pathname + '?_=' + Date.now() + location.hash);
        return;
      }
    })();
  </script>
  <script src="/renderer-web.js?v=30"></script>
  <script>
    (function() {
      var btn = document.getElementById('download-btn');
      if (!btn) return;
      var ua = navigator.userAgent;
      var isMac = /Mac/.test(ua);
      var isWin = /Win/.test(ua);
      if (!isMac && !isWin) return;
      btn.title = isMac ? 'Download for Mac' : 'Download for Windows';
      fetch('https://api.github.com/repos/G3dar/stupidlist-app/releases/latest')
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(release) {
          if (!release.assets) return;
          var ext = isMac ? '.dmg' : '.exe';
          var asset = release.assets.find(function(a) { return a.name.endsWith(ext); });
          if (asset) btn.href = asset.browser_download_url;
        })
        .catch(function() {});
    })();
  </script>
</body>
</html>
